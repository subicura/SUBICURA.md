  <style>
    :root {
      --fg: #1a1a1a;
      --fg-muted: #666;
      --bg: #fafafa;
      --border: #e0e0e0;
      --accent: #0066cc;
      --code-bg: #f0f0f0;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #e8e8e8;
        --fg-muted: #999;
        --bg: #111;
        --border: #333;
        --accent: #66b3ff;
        --code-bg: #1a1a1a;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.7;
      font-size: 16px;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }

    .back {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: var(--fg-muted);
      text-decoration: none;
      margin-bottom: 2rem;
      display: inline-block;
    }

    .back:hover {
      color: var(--accent);
    }

    header {
      margin-bottom: 3rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 2rem;
    }

    h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-family: 'JetBrains Mono', monospace;
      color: var(--fg-muted);
      font-size: 0.9rem;
    }

    .version {
      display: inline-block;
      background: var(--code-bg);
      padding: 0.2rem 0.5rem;
      border-radius: 3px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      margin-left: 0.5rem;
    }

    section {
      margin-bottom: 3rem;
    }

    h2 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--fg-muted);
      margin-bottom: 1rem;
      text-transform: lowercase;
    }

    h2::before {
      content: '## ';
      opacity: 0.5;
    }

    ul {
      list-style: none;
      margin: 1rem 0;
    }

    ul li {
      position: relative;
      padding-left: 1.5rem;
      margin-bottom: 0.75rem;
    }

    ul li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .container {
        padding: 2rem 1.5rem;
      }

      h1 {
        font-size: 2rem;
      }
    }
  </style>
